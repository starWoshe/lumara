name: Daily Post — Luna

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt
      - run: pip install -r packages/agents/luna/scripts/requirements.txt
      - run: python packages/agents/luna/scripts/telegram_bot.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LUNA_PAGE_ACCESS_TOKEN: ${{ secrets.LUNA_PAGE_ACCESS_TOKEN }}
          LUNA_PAGE_ID: ${{ secrets.LUNA_PAGE_ID }}
          LUNA_IG_USER_ID: ${{ secrets.LUNA_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          LUNA_TELEGRAM_BOT_TOKEN: ${{ secrets.LUNA_TELEGRAM_BOT_TOKEN }}
          LUNA_TELEGRAM_CHANNEL_ID: ${{ secrets.LUNA_TELEGRAM_CHANNEL_ID }}
          LUMARA_TELEGRAM_CHANNEL_ID: ${{ secrets.LUMARA_TELEGRAM_CHANNEL_ID }}
