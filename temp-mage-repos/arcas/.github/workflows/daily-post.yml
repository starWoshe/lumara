name: Daily Post — Arcas

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/arcas/scripts/requirements.txt
      - run: pip install -r packages/agents/arcas/scripts/requirements.txt
      - run: |
          echo "=== ENV DIAGNOSTICS ==="
          env | grep -E '^(ANTHROPIC|OPENAI|ARCAS|LUMARA|IG_|TELEGRAM)_' || true
          echo "======================="
          python packages/agents/arcas/scripts/daily_bot.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARCAS_PAGE_ACCESS_TOKEN: ${{ secrets.ARCAS_PAGE_ACCESS_TOKEN }}
          ARCAS_PAGE_ID: ${{ secrets.ARCAS_PAGE_ID }}
          ARCAS_IG_USER_ID: ${{ secrets.ARCAS_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ARCAS_TELEGRAM_BOT_TOKEN: ${{ secrets.ARCAS_TELEGRAM_BOT_TOKEN }}
          ARCAS_TELEGRAM_CHANNEL_ID: ${{ secrets.ARCAS_TELEGRAM_CHANNEL_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
