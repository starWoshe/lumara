name: Daily Post — Umbra

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/umbra/scripts/requirements.txt
      - run: pip install -r packages/agents/umbra/scripts/requirements.txt
      - run: python packages/agents/umbra/scripts/daily_bot.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UMBRA_PAGE_ACCESS_TOKEN: ${{ secrets.UMBRA_PAGE_ACCESS_TOKEN }}
          UMBRA_PAGE_ID: ${{ secrets.UMBRA_PAGE_ID }}
          UMBRA_IG_USER_ID: ${{ secrets.UMBRA_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          UMBRA_TELEGRAM_BOT_TOKEN: ${{ secrets.UMBRA_TELEGRAM_BOT_TOKEN }}
          UMBRA_TELEGRAM_CHANNEL_ID: ${{ secrets.UMBRA_TELEGRAM_CHANNEL_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
