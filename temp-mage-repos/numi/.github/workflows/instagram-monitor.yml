name: Instagram Comment Monitor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt
      - run: pip install -r packages/agents/scripts/requirements.txt
      - run: python packages/agents/scripts/instagram_comment_monitor.py
        env:
          MONITOR_PLATFORM: instagram
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_MAX_PER_DAY: ${{ secrets.INSTAGRAM_MAX_PER_DAY || '20' }}
          NUMI_IG_USER_ID: ${{ secrets.NUMI_IG_USER_ID }}
