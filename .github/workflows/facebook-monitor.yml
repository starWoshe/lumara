name: Facebook Comment Monitor

on:
  schedule:
    # Частота: щогодини, зміщено на 30 хв від Instagram
    - cron: '30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor-facebook-comments:
    name: Моніторинг коментарів Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v5

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/scripts/requirements.txt

      - name: Запустити Facebook моніторинг
        env:
          MONITOR_PLATFORM: facebook
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LUNA_FB_PAGE_ID: ${{ secrets.LUNA_FB_PAGE_ID }}
          ARCAS_FB_PAGE_ID: ${{ secrets.ARCAS_FB_PAGE_ID }}
          NUMI_FB_PAGE_ID: ${{ secrets.NUMI_FB_PAGE_ID }}
          UMBRA_FB_PAGE_ID: ${{ secrets.UMBRA_FB_PAGE_ID }}
          LUNA_PAGE_ACCESS_TOKEN: ${{ secrets.LUNA_PAGE_ACCESS_TOKEN }}
          ARCAS_PAGE_ACCESS_TOKEN: ${{ secrets.ARCAS_PAGE_ACCESS_TOKEN }}
          NUMI_PAGE_ACCESS_TOKEN: ${{ secrets.NUMI_PAGE_ACCESS_TOKEN }}
          UMBRA_PAGE_ACCESS_TOKEN: ${{ secrets.UMBRA_PAGE_ACCESS_TOKEN }}
          FACEBOOK_MAX_PER_DAY: ${{ secrets.FACEBOOK_MAX_PER_DAY || '15' }}
        run: |
          python packages/agents/scripts/instagram_comment_monitor.py

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: Facebook Monitor%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"

      # State зберігається в Supabase (monitor_states) під platform='FACEBOOK'

