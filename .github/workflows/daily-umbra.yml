name: UMBRA — Вечірня рефлексія

on:
  # 17:00 UTC = 20:00 Київ влітку (EEST, UTC+3) — вечірній пост
  schedule:
    - cron: '0 17 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

jobs:
  publish-daily-post:
    name: Публікація вечірньої рефлексії UMBRA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити щоденний бот UMBRA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Meta API — один токен для всіх акаунтів
          META_USER_TOKEN: ${{ secrets.META_USER_TOKEN }}
          UMBRA_PAGE_ID: ${{ secrets.UMBRA_PAGE_ID }}
          UMBRA_IG_USER_ID: ${{ secrets.UMBRA_IG_USER_ID }}
          LUMARA_PAGE_ID: ${{ secrets.LUMARA_PAGE_ID }}
          LUMARA_IG_USER_ID: ${{ secrets.LUMARA_IG_USER_ID }}
        run: |
          python packages/agents/umbra/scripts/daily_bot.py

      - name: Завантажити контент як артефакт
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: umbra-content-${{ github.run_id }}
          path: instagram-content/
          retention-days: 30
