name: LUMARA Academy — Пости в Telegram

on:
  # Розклад (UTC, Київ = UTC+3 влітку):
  # Понеділок  07:00 UTC = 10:00 Київ
  # Середа     07:00 UTC = 10:00 Київ
  # Пʼятниця   07:00 UTC = 10:00 Київ
  # Неділя     08:00 UTC = 11:00 Київ
  schedule:
    - cron: '0 7 * * 1'
    - cron: '0 7 * * 3'
    - cron: '0 7 * * 5'
    - cron: '0 8 * * 0'

  # Ручний запуск для тестування
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-academy-post:
    name: Публікація посту академії
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Визначити день публікації
        id: day
        run: |
          DOW=$(date -u +%u)
          case "$DOW" in
            1) DAY="monday" ;;
            3) DAY="wednesday" ;;
            5) DAY="friday" ;;
            7) DAY="sunday" ;;
            *) DAY="unknown" ;;
          esac
          echo "day=$DAY" >> "$GITHUB_OUTPUT"
          echo "День публікації: $DAY"

      - name: Опублікувати пост через API
        if: steps.day.outputs.day != 'unknown'
        run: |
          HTTP_CODE=$(curl -sSL -w "%{http_code}" -X GET \
            "https://lumara.fyi/api/academy/post?day=${{ steps.day.outputs.day }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Accept: application/json" \
            --max-time 60 \
            -o response.json)

          echo "HTTP код: $HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Помилка API: HTTP $HTTP_CODE"
            exit 1
          fi

          # Перевіряємо що відповідь ok
          if [ "$(jq -r '.ok' response.json)" != "true" ]; then
            echo "Помилка публікації посту академії"
            exit 1
          fi

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: ${{ github.workflow }}%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"
