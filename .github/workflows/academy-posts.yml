name: LUMARA Academy — Пости в Telegram

on:
  # Розклад (UTC, Київ = UTC+3 влітку):
  # Понеділок  07:00 UTC = 10:00 Київ
  # Середа     07:00 UTC = 10:00 Київ
  # Пʼятниця   07:00 UTC = 10:00 Київ
  # Неділя     08:00 UTC = 11:00 Київ
  schedule:
    - cron: '0 7 * * 1'
    - cron: '0 7 * * 3'
    - cron: '0 7 * * 5'
    - cron: '0 8 * * 0'

  # Ручний запуск для тестування
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-academy-post:
    name: Публікація посту академії
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Визначити день публікації
        id: day
        run: |
          DOW=$(date -u +%u)
          case "$DOW" in
            1) DAY="monday" ;;
            3) DAY="wednesday" ;;
            5) DAY="friday" ;;
            7) DAY="sunday" ;;
            *) DAY="unknown" ;;
          esac
          echo "day=$DAY" >> "$GITHUB_OUTPUT"
          echo "День публікації: $DAY"

      - name: Опублікувати пост через API (з retry)
        if: steps.day.outputs.day != 'unknown'
        run: |
          API_URL="https://lumara.fyi/api/academy/post?day=${{ steps.day.outputs.day }}"
          AUTH="Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          MAX_RETRIES=3
          DELAYS=(0 5 15)
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            if [ $i -gt 1 ]; then
              echo "⏳ Повторна спроба $i/${MAX_RETRIES} через ${DELAYS[$((i-1))]} секунд..."
              sleep ${DELAYS[$((i-1))]}
            fi

            HTTP_CODE=$(curl -sSL -w "%{http_code}" -X GET \
              "$API_URL" \
              -H "$AUTH" \
              -H "Accept: application/json" \
              --max-time 60 \
              -o response.json)

            echo "HTTP код (спроба $i): $HTTP_CODE"
            cat response.json
            echo ""

            if [ "$HTTP_CODE" = "200" ]; then
              OK=$(jq -r '.ok' response.json)
              if [ "$OK" = "true" ]; then
                echo "✅ Пост успішно опубліковано"
                SUCCESS=true
                break
              else
                ERROR=$(jq -r '.error // "unknown"' response.json)
                echo "⚠️ API повернув ok=false: $ERROR"
              fi
            else
              echo "⚠️ HTTP $HTTP_CODE — буде повторна спроба"
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Усі $MAX_RETRIES спроби провалились"
            exit 1
          fi

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: ${{ github.workflow }}%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"
