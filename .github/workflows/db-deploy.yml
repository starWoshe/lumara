name: Database Deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/database/prisma/schema.prisma'
      - 'packages/database/**/*.sql'
      - '.github/workflows/db-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm --filter @lumara/database db:generate

      - name: Debug — check DB connection
        run: |
          echo "Testing database connectivity..."
          echo "DATABASE_URL is set: $([[ -n "$DATABASE_URL" ]] && echo 'YES' || echo 'NO')"
          echo "DIRECT_URL is set: $([[ -n "$DIRECT_URL" ]] && echo 'YES' || echo 'NO')"
          host=$(echo "$DIRECT_URL" | sed -n 's/.*@\([^:]*\).*/\1/p')
          echo "Host from DIRECT_URL: $host"
          nc -zv -w 5 "$host" 5432 || echo "Port 5432 unreachable (Supabase may be paused)"

      - name: Push Prisma Schema to DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          set +e
          echo "Attempting prisma db push..."
          pnpm --filter @lumara/database exec prisma db push --skip-generate
          PUSH_EXIT=$?
          if [ $PUSH_EXIT -ne 0 ]; then
            echo "⚠️ prisma db push failed (exit $PUSH_EXIT). Likely DIRECT_URL is unreachable from GitHub runners."
            echo "   Schema changes should be applied manually via Supabase SQL Editor if needed."
            echo "   Continuing with SQL scripts..."
          else
            echo "✅ prisma db push succeeded"
          fi

      - name: Deploy Prisma Migrations
        run: |
          if [ -d "packages/database/prisma/migrations" ] && [ "$(ls -A packages/database/prisma/migrations)" ]; then
            echo "Prisma migrations found. Running deploy..."
            pnpm --filter @lumara/database db:deploy
          else
            echo "No Prisma migrations found. Skipping migrate deploy."
          fi

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply Supabase Schema SQL
        run: |
          if [ -f "packages/database/supabase-migration.sql" ]; then
            echo "Applying supabase-migration.sql..."
            psql "$DATABASE_URL" -f packages/database/supabase-migration.sql || {
              echo "Schema SQL failed — continuing to RLS..."
            }
          else
            echo "supabase-migration.sql not found, skipping"
          fi

      - name: Apply Supabase RLS Policies
        run: |
          if [ -f "packages/database/rls-policies.sql" ]; then
            echo "Applying rls-policies.sql..."
            psql "$DATABASE_URL" -f packages/database/rls-policies.sql || {
              echo "RLS SQL failed — check if tables exist"
            }
          else
            echo "rls-policies.sql not found, skipping"
          fi
