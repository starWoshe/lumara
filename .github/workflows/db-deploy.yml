name: Database Deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/database/prisma/schema.prisma'
      - 'packages/database/**/*.sql'
      - '.github/workflows/db-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm --filter @lumara/database db:generate

      - name: Push Prisma Schema to DB
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: pnpm --filter @lumara/database exec prisma db push --skip-generate

      - name: Deploy Prisma Migrations
        run: |
          if [ -d "packages/database/prisma/migrations" ] && [ "$(ls -A packages/database/prisma/migrations)" ]; then
            echo "Prisma migrations found. Running deploy..."
            pnpm --filter @lumara/database db:deploy
          else
            echo "No Prisma migrations found. Skipping migrate deploy."
            echo "TIP: run 'pnpm --filter @lumara/database prisma migrate dev --name init' locally to create initial migrations."
          fi

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply Supabase Schema SQL
        run: |
          if [ -f "packages/database/supabase-migration.sql" ]; then
            echo "Applying supabase-migration.sql..."
            cd packages/database && node --dns-result-order=ipv4first -e "
              const { Client } = require('pg');
              const fs = require('fs');
              const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
              client.connect().then(() => {
                const sql = fs.readFileSync('supabase-migration.sql', 'utf8');
                return client.query(sql);
              }).then(() => {
                console.log('Schema SQL applied');
                client.end();
              }).catch(err => {
                console.error('Migration error:', err.message);
                console.warn('Apply manually in Supabase SQL Editor if needed.');
              });
            "
          fi

      - name: Apply Supabase RLS Policies
        run: |
          if [ -f "packages/database/rls-policies.sql" ]; then
            echo "Applying rls-policies.sql..."
            cd packages/database && node --dns-result-order=ipv4first -e "
              const { Client } = require('pg');
              const fs = require('fs');
              const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
              client.connect().then(() => {
                const sql = fs.readFileSync('rls-policies.sql', 'utf8');
                return client.query(sql);
              }).then(() => {
                console.log('RLS policies applied');
                client.end();
              }).catch(err => {
                console.error('RLS error:', err.message);
                console.warn('Apply manually in Supabase SQL Editor if needed.');
              });
            "
          fi
