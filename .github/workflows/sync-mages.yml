name: Sync Mage Repositories

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    name: Sync code and secrets to mage repos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - mage: luna
            repo: lunalumarafyi-lab/lumara
            token_secret: LUNA_GITHUB_TOKEN
            daily_cron: '0 19 * * *'
            ig_user_id_secret: LUNA_IG_USER_ID
            fb_page_id_secret: LUNA_FB_PAGE_ID
            page_access_token_secret: LUNA_PAGE_ACCESS_TOKEN
            page_id_secret: LUNA_PAGE_ID
            telegram_channel_id_secret: LUNA_TELEGRAM_CHANNEL_ID
            telegram_bot_token_secret: LUNA_TELEGRAM_BOT_TOKEN
          - mage: arcas
            repo: arcaslumara-max/lumara
            token_secret: ARCAS_GITHUB_TOKEN
            daily_cron: '0 5 * * *'
            ig_user_id_secret: ARCAS_IG_USER_ID
            fb_page_id_secret: ARCAS_FB_PAGE_ID
            page_access_token_secret: ARCAS_PAGE_ACCESS_TOKEN
            page_id_secret: ARCAS_PAGE_ID
            telegram_channel_id_secret: ARCAS_TELEGRAM_CHANNEL_ID
            telegram_bot_token_secret: ARCAS_TELEGRAM_BOT_TOKEN
          - mage: numi
            repo: numilumara-design/lumara
            token_secret: NUMI_GITHUB_TOKEN
            daily_cron: '0 10 * * *'
            ig_user_id_secret: NUMI_IG_USER_ID
            fb_page_id_secret: NUMI_FB_PAGE_ID
            page_access_token_secret: NUMI_PAGE_ACCESS_TOKEN
            page_id_secret: NUMI_PAGE_ID
            telegram_channel_id_secret: NUMI_TELEGRAM_CHANNEL_ID
            telegram_bot_token_secret: NUMI_TELEGRAM_BOT_TOKEN
          - mage: umbra
            repo: umbralumara-oss/lumara
            token_secret: UMBRA_GITHUB_TOKEN
            daily_cron: '0 16 * * *'
            ig_user_id_secret: UMBRA_IG_USER_ID
            fb_page_id_secret: UMBRA_FB_PAGE_ID
            page_access_token_secret: UMBRA_PAGE_ACCESS_TOKEN
            page_id_secret: UMBRA_PAGE_ID
            telegram_channel_id_secret: UMBRA_TELEGRAM_CHANNEL_ID
            telegram_bot_token_secret: UMBRA_TELEGRAM_BOT_TOKEN

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v5

      - name: Configure GitHub CLI
        env:
          GH_TOKEN: ${{ secrets[matrix.token_secret] }}
        run: |
          gh auth status || true

      - name: Sync files to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets[matrix.token_secret] }}
          REPO: ${{ matrix.repo }}
          MAGE: ${{ matrix.mage }}
        run: |
          set -e
          echo "📡 Syncing files to $REPO for mage $MAGE"

          # ── Helper: upload file via GitHub API ──
          upload_file() {
            local src="$1"
            local dst="$2"
            local msg="$3"

            if [ ! -r "$src" ]; then
              echo "  ⚠️ Source not readable: $src"
              return 0
            fi

            local content
            content=$(base64 -w0 "$src")

            local sha
            sha=$(gh api "repos/$REPO/contents/$dst" --jq '.sha' 2>/dev/null || true)

            local payload
            if [ -n "$sha" ]; then
              payload=$(jq -n \
                --arg msg "$msg" \
                --arg content "$content" \
                --arg sha "$sha" \
                '{message: $msg, content: $content, sha: $sha}')
            else
              payload=$(jq -n \
                --arg msg "$msg" \
                --arg content "$content" \
                '{message: $msg, content: $content}')
            fi

            gh api "repos/$REPO/contents/$dst" --method PUT --input - <<< "$payload"
            echo "  ✅ Uploaded $dst"
          }

          # ── Shared scripts ──
          upload_file "packages/agents/scripts/instagram_comment_monitor.py" \
            "packages/agents/scripts/instagram_comment_monitor.py" \
            "sync: instagram comment monitor"

          upload_file "packages/agents/scripts/requirements.txt" \
            "packages/agents/scripts/requirements.txt" \
            "sync: monitor requirements"

          upload_file "packages/agents/shared/meta_publisher.py" \
            "packages/agents/shared/meta_publisher.py" \
            "sync: meta publisher"

          # ── Mage-specific daily bot scripts ──
          upload_file "packages/agents/$MAGE/scripts/daily_bot.py" \
            "packages/agents/$MAGE/scripts/daily_bot.py" \
            "sync: daily bot"

          if [ -f "packages/agents/$MAGE/scripts/requirements.txt" ]; then
            upload_file "packages/agents/$MAGE/scripts/requirements.txt" \
              "packages/agents/$MAGE/scripts/requirements.txt" \
              "sync: daily bot requirements"
          fi

          if [ "$MAGE" = "luna" ] && [ -f "packages/agents/luna/scripts/astro_calendar.py" ]; then
            upload_file "packages/agents/luna/scripts/astro_calendar.py" \
              "packages/agents/luna/scripts/astro_calendar.py" \
              "sync: astro calendar"
          fi

          # ── Sync workflow files from local templates ──
          upload_file "temp-mage-repos/$MAGE/.github/workflows/instagram-monitor.yml" \
            ".github/workflows/instagram-monitor.yml" \
            "sync: instagram workflow"

          upload_file "temp-mage-repos/$MAGE/.github/workflows/facebook-monitor.yml" \
            ".github/workflows/facebook-monitor.yml" \
            "sync: facebook workflow"

          upload_file "temp-mage-repos/$MAGE/.github/workflows/daily-post.yml" \
            ".github/workflows/daily-post.yml" \
            "sync: daily post workflow"

      - name: Sync secrets to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets[matrix.token_secret] }}
          REPO: ${{ matrix.repo }}
          MAGE: ${{ matrix.mage }}
        run: |
          set -e
          echo "🔐 Syncing secrets to $REPO"

          set_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | gh secret set "$name" --repo "$REPO"
              echo "  ✅ Secret $name set (length: ${#value})"
            else
              echo "  ⚠️ Secret $name is empty, skipping"
            fi
          }

          set_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          set_secret "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"
          set_secret "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          set_secret "DIRECT_URL" "${{ secrets.DIRECT_URL }}"
          set_secret "IG_ACCESS_TOKEN" "${{ secrets.IG_ACCESS_TOKEN }}"
          set_secret "${MAGE^^}_IG_USER_ID" "${{ secrets[matrix.ig_user_id_secret] }}"
          set_secret "${MAGE^^}_FB_PAGE_ID" "${{ secrets[matrix.fb_page_id_secret] }}"
          set_secret "${MAGE^^}_PAGE_ACCESS_TOKEN" "${{ secrets[matrix.page_access_token_secret] }}"
          set_secret "${MAGE^^}_PAGE_ID" "${{ secrets[matrix.page_id_secret] }}"
          set_secret "${MAGE^^}_TELEGRAM_CHANNEL_ID" "${{ secrets[matrix.telegram_channel_id_secret] }}"
          set_secret "TELEGRAM_BOT_TOKEN" "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          set_secret "${MAGE^^}_TELEGRAM_BOT_TOKEN" "${{ secrets[matrix.telegram_bot_token_secret] }}"
          set_secret "LUMARA_TELEGRAM_CHANNEL_ID" "${{ secrets.LUMARA_TELEGRAM_CHANNEL_ID }}"
          set_secret "TELEGRAM_CHANNEL_ID" "${{ secrets.TELEGRAM_CHANNEL_ID }}"
          set_secret "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          set_secret "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          set_secret "INSTAGRAM_MAX_PER_DAY" "${{ secrets.INSTAGRAM_MAX_PER_DAY || '20' }}"
          set_secret "FACEBOOK_MAX_PER_DAY" "${{ secrets.FACEBOOK_MAX_PER_DAY || '15' }}"

          echo "✅ Secrets synced to $REPO"

          # ── Діагностика: перевірка секретів у цільовому репозиторії ──
          echo ""
          echo "🔍 Діагностика: перевірка секретів у $REPO"
          set +e
          secret_list=$(gh secret list --repo "$REPO" 2>/dev/null)
          list_exit_code=$?
          set -e

          if [ $list_exit_code -ne 0 ] || [ -z "$secret_list" ]; then
            echo "  ⚠️ Не вдалося отримати список секретів з $REPO (код: $list_exit_code)"
          else
            echo "$secret_list"
            echo ""
            echo "📋 Перевірка критичних секретів для $MAGE:"
            for required in "ANTHROPIC_API_KEY" "OPENAI_API_KEY" "${MAGE^^}_PAGE_ACCESS_TOKEN" "${MAGE^^}_PAGE_ID" "${MAGE^^}_IG_USER_ID" "${MAGE^^}_TELEGRAM_BOT_TOKEN" "${MAGE^^}_TELEGRAM_CHANNEL_ID"; do
              if echo "$secret_list" | grep -q "^$required[[:space:]]"; then
                echo "  ✅ $required — присутній"
              else
                echo "  ❌ $required — ВІДСУТНІЙ (daily_bot.py може впасти)"
              fi
            done
          fi

