name: Telegram Group Monitor

on:
  schedule:
    # Частота: ~кожні 2 години. Змінити значення нижче щоб регулювати інтервал
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor-telegram-groups:
    name: Моніторинг Telegram груп
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/scripts/requirements.txt

      - name: Запустити Telegram моніторинг
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_MONITORED_GROUPS: ${{ secrets.TELEGRAM_MONITORED_GROUPS }}
          TELEGRAM_MAX_PER_HOUR: ${{ secrets.TELEGRAM_MAX_PER_HOUR || '5' }}
        run: |
          python packages/agents/scripts/telegram_monitor.py

      # State тепер зберігається в Supabase (monitor_states), артефакти не потрібні
