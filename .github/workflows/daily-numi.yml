name: NUMI — Нумерологія дня

on:
  # 10:00 UTC = 13:00 Київ влітку (EEST, UTC+3) — обідній пост
  schedule:
    - cron: '0 10 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-daily-post:
    name: Публікація нумерологічного прогнозу
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити щоденний бот NUMI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Meta — постійні Page Access Tokens
          NUMI_PAGE_ACCESS_TOKEN: ${{ secrets.NUMI_PAGE_ACCESS_TOKEN }}
          NUMI_PAGE_ID: ${{ secrets.NUMI_PAGE_ID }}
          NUMI_IG_USER_ID: ${{ secrets.NUMI_IG_USER_ID }}
          LUMARA_PAGE_ACCESS_TOKEN: ${{ secrets.LUMARA_PAGE_ACCESS_TOKEN }}
          LUMARA_PAGE_ID: ${{ secrets.LUMARA_PAGE_ID }}
          LUMARA_IG_USER_ID: ${{ secrets.LUMARA_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Telegram (опційно)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NUMI_TELEGRAM_CHANNEL_ID: ${{ secrets.NUMI_TELEGRAM_CHANNEL_ID }}
        run: |
          python packages/agents/numi/scripts/daily_bot.py

      - name: Завантажити контент як артефакт
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: numi-content-${{ github.run_id }}
          path: instagram-content/
          retention-days: 30
