name: Academy Weekend Post

on:
  schedule:
    - cron: '0 10 * * 6'  # Субота 10:00 UTC = 12:00 Київ
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt
      - run: pip install -r packages/agents/scripts/requirements.txt
      - run: python packages/agents/scripts/academy_publisher.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACADEMY_PAGE_ACCESS_TOKEN: ${{ secrets.ACADEMY_PAGE_ACCESS_TOKEN }}
          ACADEMY_FB_PAGE_ID: ${{ secrets.ACADEMY_FB_PAGE_ID }}
          ACADEMY_IG_USER_ID: ${{ secrets.ACADEMY_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ACADEMY_COVER_IMAGE_URL: ${{ secrets.ACADEMY_COVER_IMAGE_URL }}

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: Academy Weekend Post%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"
