name: LUNA — Щоденний астрологічний пост

on:
  # Запуск щодня о 22:00 Київ влітку / 21:00 Київ взимку
  # 19:00 UTC = 22:00 Київ влітку (EEST, UTC+3)
  schedule:
    - cron: '0 19 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-daily-post:
    name: Публікація щоденного прогнозу LUNA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити Telegram бота LUNA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Другий Telegram канал — відключено (LUMARA Academy Telegram не використовується)
          # Meta — постійні Page Access Tokens
          LUNA_PAGE_ACCESS_TOKEN: ${{ secrets.LUNA_PAGE_ACCESS_TOKEN }}
          LUNA_PAGE_ID: ${{ secrets.LUNA_PAGE_ID }}
          LUNA_IG_USER_ID: ${{ secrets.LUNA_IG_USER_ID }}
          LUMARA_PAGE_ACCESS_TOKEN: ${{ secrets.LUMARA_PAGE_ACCESS_TOKEN }}
          LUMARA_PAGE_ID: ${{ secrets.LUMARA_PAGE_ID }}
          LUMARA_IG_USER_ID: ${{ secrets.LUMARA_IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          python packages/agents/luna/scripts/telegram_bot.py

      - name: Завантажити Instagram контент як артефакт
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instagram-content-${{ github.run_id }}
          path: instagram-content/
          retention-days: 30
