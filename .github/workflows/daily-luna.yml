name: LUNA — Щоденний астрологічний пост

on:
  # Запуск щодня о 07:00 UTC = 09:00 Київ (UTC+2)
  schedule:
    - cron: '0 7 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

jobs:
  publish-daily-post:
    name: Публікація щоденного прогнозу LUNA
    runs-on: ubuntu-latest

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити Telegram бота LUNA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Другий Telegram канал (опційно)
          TELEGRAM_CHANNEL_ID_2: ${{ secrets.TELEGRAM_CHANNEL_ID_2 }}
          # Buffer API (Instagram, Facebook тощо) — опційно
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          # Instagram Graph API напряму через Meta (опційно)
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          python packages/agents/luna/scripts/telegram_bot.py

      - name: Завантажити Instagram контент як артефакт
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instagram-content-${{ github.run_id }}
          path: instagram-content/
          retention-days: 30
