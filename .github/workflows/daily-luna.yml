name: LUNA — Щоденний астрологічний пост

on:
  # Запуск щодня о 09:00 Київ (UTC+3 літо / UTC+2 зима)
  # 06:00 UTC = 09:00 Київ влітку (EEST, UTC+3, квітень–жовтень)
  # Взимку (листопад–березень, UTC+2) пост виходитиме о 08:00 Київ
  schedule:
    - cron: '0 6 * * *'

  # Ручний запуск для тестування
  workflow_dispatch:

jobs:
  publish-daily-post:
    name: Публікація щоденного прогнозу LUNA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/luna/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/luna/scripts/requirements.txt

      - name: Запустити Telegram бота LUNA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Другий Telegram канал (опційно)
          TELEGRAM_CHANNEL_ID_2: ${{ secrets.TELEGRAM_CHANNEL_ID_2 }}
          # Meta API — один токен для всіх акаунтів
          META_USER_TOKEN: ${{ secrets.META_USER_TOKEN }}
          LUNA_PAGE_ID: ${{ secrets.LUNA_PAGE_ID }}
          LUNA_IG_USER_ID: ${{ secrets.LUNA_IG_USER_ID }}
          LUMARA_PAGE_ID: ${{ secrets.LUMARA_PAGE_ID }}
          LUMARA_IG_USER_ID: ${{ secrets.LUMARA_IG_USER_ID }}
        run: |
          python packages/agents/luna/scripts/telegram_bot.py

      - name: Завантажити Instagram контент як артефакт
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instagram-content-${{ github.run_id }}
          path: instagram-content/
          retention-days: 30
