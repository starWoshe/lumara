name: Автооновлення IG_ACCESS_TOKEN

on:
  # 1-го числа кожного місяця о 08:00 UTC (~30 днів між оновленнями, токен живе 60 днів)
  schedule:
    - cron: '0 8 1 * *'

  # Ручний запуск (для першого тесту або термінового оновлення)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-token:
    name: Оновлення Instagram Access Token
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v5

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановити залежності
        run: pip install httpx

      - name: Оновити IG_ACCESS_TOKEN
        id: refresh
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_APP_ID: '1999886223962354'
        run: |
          OUTPUT=$(python packages/agents/shared/refresh_ig_token.py)
          echo "$OUTPUT"

          # Витягуємо новий токен з виводу
          NEW_TOKEN=$(echo "$OUTPUT" | grep '^NEW_TOKEN=' | cut -d= -f2-)
          EXPIRES_DATE=$(echo "$OUTPUT" | grep '^EXPIRES_DATE=' | cut -d= -f2-)

          if [ -z "$NEW_TOKEN" ]; then
            echo "❌ Не вдалось отримати новий токен"
            exit 1
          fi

          # Маскуємо токен у логах
          echo "::add-mask::$NEW_TOKEN"

          # Зберігаємо для наступного кроку
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          echo "expires_date=$EXPIRES_DATE" >> $GITHUB_OUTPUT
          echo "✅ Токен готовий до запису"

      - name: Записати новий токен в GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN="${{ steps.refresh.outputs.new_token }}"
          EXPIRES_DATE="${{ steps.refresh.outputs.expires_date }}"

          gh secret set IG_ACCESS_TOKEN --body "$NEW_TOKEN" --repo "${{ github.repository }}"
          echo "✅ IG_ACCESS_TOKEN оновлено в GitHub Secrets"
          echo "📅 Новий термін дії: $EXPIRES_DATE"

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: ${{ github.workflow }}%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"

