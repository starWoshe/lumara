name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # Перевірка типів TypeScript
  type-check:
    name: TypeScript перевірка
    runs-on: ubuntu-latest
    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Встановити Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Встановити залежності
        run: pnpm install

      - name: Перевірка типів
        run: pnpm run type-check

  # Lint
  lint:
    name: Перевірка коду
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Встановити pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Встановити Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Встановити залежності
        run: pnpm install

      - name: Lint
        run: pnpm run lint

  # Деплой на Vercel (тільки main)
  deploy:
    name: Деплой на Vercel
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Встановити Vercel CLI
        run: npm install -g vercel@latest

      - name: Деплой на Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
