name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # Перевірка типів TypeScript
  type-check:
    name: TypeScript перевірка
    runs-on: ubuntu-latest
    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v5

      - name: Встановити pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Встановити Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Встановити залежності
        run: pnpm install

      - name: Перевірка типів
        run: pnpm run type-check

  # Lint
  lint:
    name: Перевірка коду
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Встановити pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Встановити Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Встановити залежності
        run: pnpm install

      - name: Lint
        run: pnpm run lint

  # Деплой керується Vercel через GitHub інтеграцію автоматично

