name: Get ARCAS IG User ID (one-time)
on:
  workflow_dispatch:
jobs:
  get-id:
    runs-on: ubuntu-latest
    steps:
      - name: Query ARCAS Instagram ID
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ARCAS_PAGE_ACCESS_TOKEN: ${{ secrets.ARCAS_PAGE_ACCESS_TOKEN }}
        run: |
          echo "=== /me/accounts via IG_ACCESS_TOKEN ==="
          curl -s "https://graph.facebook.com/v19.0/me/accounts?fields=id,name,access_token&access_token=$IG_ACCESS_TOKEN"
          echo ""
          echo "=== ARCAS page instagram_business_account via ARCAS_PAGE_ACCESS_TOKEN ==="
          curl -s "https://graph.facebook.com/v19.0/1059568480573429?fields=instagram_business_account,connected_instagram_account&access_token=$ARCAS_PAGE_ACCESS_TOKEN"
          echo ""
          echo "=== instagram_accounts via ARCAS_PAGE_ACCESS_TOKEN ==="
          curl -s "https://graph.facebook.com/v19.0/1059568480573429/instagram_accounts?fields=id,username&access_token=$ARCAS_PAGE_ACCESS_TOKEN"
