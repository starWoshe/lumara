name: Instagram Comment Monitor

on:
  schedule:
    # Частота: кожні 2 години
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor-instagram-comments:
    name: Моніторинг коментарів Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/scripts/requirements.txt

      - name: Запустити Instagram моніторинг
        env:
          MONITOR_PLATFORM: instagram
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LUNA_IG_USER_ID: ${{ secrets.LUNA_IG_USER_ID }}
          ARCAS_IG_USER_ID: ${{ secrets.ARCAS_IG_USER_ID }}
          NUMI_IG_USER_ID: ${{ secrets.NUMI_IG_USER_ID }}
          UMBRA_IG_USER_ID: ${{ secrets.UMBRA_IG_USER_ID }}
          INSTAGRAM_MAX_PER_DAY: ${{ secrets.INSTAGRAM_MAX_PER_DAY || '20' }}
        run: |
          python packages/agents/scripts/instagram_comment_monitor.py

      # State тепер зберігається в Supabase (monitor_states), артефакти не потрібні
