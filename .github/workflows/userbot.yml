name: UserBot — Telegram

on:
  schedule:
    # 8:00 UTC = 10:00/11:00 Київ (залежно від сезону)
    # Випадкова затримка 0-20 хв додається в workflow для розподілу часу
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-userbot:
    name: Запуск UserBot магів
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v5

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/scripts/requirements.txt

      - name: Випадкова затримка перед стартом (0-20 хв)
        run: |
          DELAY=$(( RANDOM % 1200 ))
          echo "⏳ Затримка ${DELAY} секунд перед запуском..."
          sleep $DELAY

      - name: Запустити UserBot
        env:
          USERBOT_ENABLED: ${{ secrets.USERBOT_ENABLED || 'true' }}
          ACTIVE_USERBOTS: 'luna'
          LUNA_USERBOT_MODE: ${{ secrets.LUNA_USERBOT_MODE || 'warmup' }}
          LUNA_API_ID: ${{ secrets.LUNA_API_ID }}
          LUNA_API_HASH: ${{ secrets.LUNA_API_HASH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python packages/agents/scripts/userbot_luna.py

      - name: Звіт UserBot
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "📊 USERBOT ЗВІТ"
          echo "================"
          python3 << 'PYEOF'
          import os, json, urllib.request
          url = os.environ['SUPABASE_URL'] + '/rest/v1/userbot_logs?mage=eq.LUNA&order=created_at.desc&limit=20&select=action,group_username,message_preview,created_at'
          req = urllib.request.Request(url, headers={'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'], 'Authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY']})
          try:
              data = json.loads(urllib.request.urlopen(req).read())
              print("Останні {} дій LUNA:".format(len(data)))
              for row in data:
                  ts = row['created_at'][:19].replace('T',' ')
                  action = row.get('action','')
                  group = row.get('group_username','—')
                  preview = (row.get('message_preview') or '')[:50]
                  print("  {} | {:10} | @{:<20} | {}".format(ts, action, group, preview))
          except Exception as e:
              print("Помилка звіту: {}".format(e))
          PYEOF
          echo "================"

      - name: Telegram алерт при збої
        if: failure()
        run: |
          TEXT="🔴 LUMARA ALERT%0A%0AWorkflow: ${{ github.workflow }}%0AСтатус: ПОМИЛКА%0AЧас: $(date '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=@Volodymyr_Shemchuk" \
            -d "text=$TEXT"

