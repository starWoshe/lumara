name: UserBot — Telegram

on:
  schedule:
    # 8:00 UTC = 10:00/11:00 Київ (залежно від сезону)
    # Випадкова затримка 0-20 хв додається в workflow для розподілу часу
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-userbot:
    name: Запуск UserBot магів
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Клонувати репозиторій
        uses: actions/checkout@v4

      - name: Встановити Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/agents/scripts/requirements.txt

      - name: Встановити Python залежності
        run: |
          pip install -r packages/agents/scripts/requirements.txt

      - name: Випадкова затримка перед стартом (0-20 хв)
        run: |
          DELAY=$(( RANDOM % 1200 ))
          echo "⏳ Затримка ${DELAY} секунд перед запуском..."
          sleep $DELAY

      - name: Запустити UserBot
        env:
          USERBOT_ENABLED: ${{ secrets.USERBOT_ENABLED || 'true' }}
          ACTIVE_USERBOTS: ${{ secrets.ACTIVE_USERBOTS || 'luna' }}
          LUNA_USERBOT_MODE: ${{ secrets.LUNA_USERBOT_MODE || 'warmup' }}
          LUNA_API_ID: ${{ secrets.LUNA_API_ID }}
          LUNA_API_HASH: ${{ secrets.LUNA_API_HASH }}
          ARCAS_USERBOT_MODE: ${{ secrets.ARCAS_USERBOT_MODE || 'warmup' }}
          ARCAS_API_ID: ${{ secrets.ARCAS_API_ID }}
          ARCAS_API_HASH: ${{ secrets.ARCAS_API_HASH }}
          NUMI_USERBOT_MODE: ${{ secrets.NUMI_USERBOT_MODE || 'warmup' }}
          NUMI_API_ID: ${{ secrets.NUMI_API_ID }}
          NUMI_API_HASH: ${{ secrets.NUMI_API_HASH }}
          UMBRA_USERBOT_MODE: ${{ secrets.UMBRA_USERBOT_MODE || 'warmup' }}
          UMBRA_API_ID: ${{ secrets.UMBRA_API_ID }}
          UMBRA_API_HASH: ${{ secrets.UMBRA_API_HASH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python packages/agents/scripts/userbot_luna.py
